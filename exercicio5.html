<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Validação</title>
</head>
<body>

<style>
    body{
        text-align: center;
        margin-top: 5%;
        font-family: Arial, sans-serif;
    }
</style>

<h2>Nome</h2>
<input type="text" id="nome">
<button onclick="verificarNome()">Validar</button><br><br><br>

<h2>CPF</h2>
<input type="text" id="cpf">
<button onclick="verificarCPF()">Validar</button><br><br><br>

<h2>Telefone</h2>
<input type="text" id="telefone">
<button onclick="verificarTelefone()">Validar</button><br><br><br>

<h2>Data de Nascimento</h2>
<input type="text" id="data">
<button onclick="verificarData()">Validar</button><br><br><br>

<h2>CEP</h2>
<input type="text" id="cep">
<button onclick="verificarCEP()">Validar</button><br><br><br>

<h2>Email</h2>
<input type="text" id="email">
<button onclick="verificarEmail()">Validar</button><br><br><br>

<script>

function verificarNome(){
    let nome = document.getElementById("nome").value;

    if(nome === ""){
        alert("Digite seu nome");
    }else{
        alert("Nome ok");
    }
}

function verificarCPF(){
    let cpf = document.getElementById("cpf").value;
    let padrao = /^[0-9]{3}\.[0-9]{3}\.[0-9]{3}-[0-9]{2}$/;

    if(padrao.test(cpf)){
        alert("CPF válido");
    }else{
        alert("CPF inválido");
    }
}

function verificarTelefone(){
    let tel = document.getElementById("telefone").value;
    let padrao = /^\(\d{2}\) \d{5}-\d{4}$/;

    if(padrao.test(tel)){
        alert("Telefone válido");
    }else{
        alert("Telefone inválido");
    }
}

function verificarData(){
    let data = document.getElementById("data").value;
    let padrao = /^\d{2}\/\d{2}\/\d{4}$/;

    if(padrao.test(data)){
        alert("Data válida");
    }else{
        alert("Data inválida");
    }
}

function verificarCEP(){
    let cep = document.getElementById("cep").value;
    let padrao = /^\d{5}-\d{3}$/;

    if(padrao.test(cep)){
        alert("CEP válido");
    }else{
        alert("CEP inválido");
    }
}

document.getElementById("cpf").addEventListener("input", function(e) {
    let v = e.target.value.replace(/\D/g, "");
    v = v.replace(/(\d{3})(\d)/, "$1.$2");
    v = v.replace(/(\d{3})(\d)/, "$1.$2");
    v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
    e.target.value = v;
});

document.getElementById("telefone").addEventListener("input", function(e) {
    let v = e.target.value.replace(/\D/g, "");
    v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
    v = v.replace(/(\d{5})(\d)/, "$1-$2");
    e.target.value = v;
});

document.getElementById("data").addEventListener("input", function(e) {
    let v = e.target.value.replace(/\D/g, "");
    v = v.replace(/(\d{2})(\d)/, "$1/$2");
    v = v.replace(/(\d{2})(\d)/, "$1/$2");
    e.target.value = v;
});

document.getElementById("cep").addEventListener("input", function(e) {
    let v = e.target.value.replace(/\D/g, "");
    v = v.replace(/(\d{5})(\d)/, "$1-$2");
    e.target.value = v;
});

function verificarEmail(){
    let email = document.getElementById("email").value;
    let padrao = /\S+@\S+\.\S+/;

    if(padrao.test(email)){
        alert("Email válido");
    }else{
        alert("Email inválido");
    }
}

</script>

</body>
</html>
